name: Daily Commit

on:
  schedule:
    - cron: '0 0 * * *'   # Runs every day at 12:00 AM UTC
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Create file and commit random times
        run: |
          FILE="commit_number.md"

          # Random commits between 1 and 5
          RANDOM_COMMIT_COUNT=$((RANDOM % 5 + 1))
          echo "Total commits to make: $RANDOM_COMMIT_COUNT"

          for i in $(seq 1 $RANDOM_COMMIT_COUNT)
          do
            if [ ! -f "$FILE" ]; then
              echo "Hello my name is Sajid377" > "$FILE"
              echo "commit number: 1" >> "$FILE"
            else
              CURRENT_COUNT=$(grep -oP 'commit number: \K\d+' "$FILE" | tail -n 1)

              if [ -z "$CURRENT_COUNT" ]; then
                CURRENT_COUNT=0
              fi

              NEXT_COUNT=$((CURRENT_COUNT + 1))
              echo "commit number: $NEXT_COUNT" >> "$FILE"
            fi

            git config --global user.name "sajid377"
            git config --global user.email "sajid.dev90@gmail.com"

            git add "$FILE"
            git commit -m "workflow commit #$i" || echo "Nothing to commit"

            git push https://x-access-token:${{ secrets.AUTH_TOKEN }}@github.com/sajid377/Test.git
          done
